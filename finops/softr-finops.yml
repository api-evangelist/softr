description: >-
  FinOps view of Softr spend. Softr bills a flat monthly subscription per plan
  (Free, Basic, Professional, Business, Enterprise) rather than per-API-call.
  Cost drivers are the plan tier plus consumption against plan allowances: app
  users (with metered overages on Professional at +$10 per 10 users up to 250),
  Softr Database records, AI credits, and Workflow actions. API access is a
  plan feature unlocked from Professional upward.
notes: >-
  Subscription prices and allowances reflect softr.io/pricing at annual billing;
  month-to-month is higher. Verify overage rules and allowances during
  reconciliation.
sources:
- https://www.softr.io/pricing
- https://docs.softr.io/workspace-and-billing/pricing-and-plans
- https://focus.finops.org/focus-specification/v1-3/
