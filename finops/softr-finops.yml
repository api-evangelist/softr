meters:
- name: subscription_plan
  description: Flat monthly subscription fee for the selected Softr plan.
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: app_users
  description: Published-app end users counted against the plan allowance; overage-billed on Professional (+$10 per 10 users up to 250).
  unit: users
  aggregation: max
  dimensions:
  - account
  - plan
  - app
- name: database_records
  description: Records stored in Softr Databases, counted against the plan allowance.
  unit: records
  aggregation: max
  dimensions:
  - account
  - plan
- name: ai_credits
  description: AI credits consumed per month against the plan allowance.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - plan
- name: workflow_actions
  description: Workflow automation actions executed per month against the plan allowance.
  unit: actions
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Track the active plan and monitor consumption of app users, records, AI credits, and Workflow actions against allowances in the workspace billing area.
- name: Allocation
  description: Map each Softr workspace and published app to the team or client it serves; tag API tokens per integration.
- name: Optimization
  description: Right-size the plan to actual app-user counts and record volume; avoid Professional app-user overages by managing inactive users; consolidate apps within a workspace.
- name: Accountability
  description: Assign a workspace owner responsible for plan tier and overage review; revisit allowance burn before each renewal.
