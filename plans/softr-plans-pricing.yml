specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Softr
providerId: softr
created: '2026-06-20'
modified: '2026-06-20'
reconciled: true
tags:
- No Code
- App Builder
- Client Portals
- User Management
- Database
- Plans
description: >-
  Softr sells subscription plans for building and publishing no-code apps and
  client portals, priced per month and metered by app users, Softr Database
  records, AI credits, and Workflow actions. Programmatic API access (the Users
  Management API and Softr Database API) is included starting on the
  Professional plan. Prices below reflect annual billing; month-to-month billing
  is higher.
notes: >-
  Pricing captured from softr.io/pricing. App-user, record, AI-credit, and
  Workflow-action allowances vary per plan and change over time; verify current
  values on the pricing page during reconciliation.
sources:
- https://www.softr.io/pricing
- https://docs.softr.io/workspace-and-billing/pricing-and-plans
plans:
- id: softr-free
  name: Free
  type: free
  description: >-
    Entry tier for trying Softr - publish apps with a small app-user allowance
    and basic blocks. No programmatic API access.
  entries:
  - label: Monthly Subscription
    name: free_subscription
    type: flat
    metric: subscription
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: $0
    userMultiplied: false
  - label: App Users
    name: app_users
    type: included
    metric: users
    limit: 10
    timeFrame: month
    geo: global
    unit: 1
    price: included
    userMultiplied: false
  elements:
  - name: Unlimited Published Apps
  - name: 5,000 Softr Database Records
  - name: 5 AI Credits / month
  - name: 500 Workflow Actions
  - name: Unlimited Forms
- id: softr-basic
  name: Basic
  type: paid
  description: >-
    For small projects - more app users, records, custom code, and additional
    blocks. No programmatic API access.
  entries:
  - label: Monthly Subscription (billed annually)
    name: basic_subscription
    type: flat
    metric: subscription
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: $49 / month
    userMultiplied: false
  - label: App Users
    name: app_users
    type: included
    metric: users
    limit: 20
    timeFrame: month
    geo: global
    unit: 1
    price: included
    userMultiplied: false
  elements:
  - name: Unlimited Published Apps
  - name: 50,000 Softr Database Records
  - name: 10 AI Credits / month
  - name: 2,500 Workflow Actions
  - name: Custom Code
  - name: Kanban and Map Blocks
- id: softr-professional
  name: Professional
  type: paid
  description: >-
    For client portals and internal tools at scale - includes API access (Users
    Management API and Softr Database API), custom user groups, and advanced
    visibility settings.
  entries:
  - label: Monthly Subscription (billed annually)
    name: professional_subscription
    type: flat
    metric: subscription
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: $139 / month
    userMultiplied: false
  - label: App Users
    name: app_users
    type: included
    metric: users
    limit: 100
    timeFrame: month
    geo: global
    unit: 1
    price: included; +$10 per additional 10 users up to 250
    userMultiplied: false
  elements:
  - name: API Access (Users Management and Database APIs)
  - name: Unlimited Published Apps
  - name: 500,000 Softr Database Records
  - name: 50 AI Credits / month
  - name: 10,000 Workflow Actions
  - name: 3 Custom User Groups
  - name: Remove Softr Branding
  - name: Advanced Visibility Settings
- id: softr-business
  name: Business
  type: paid
  description: >-
    For larger teams - higher allowances, unlimited user groups, SSO, and audit
    logging. Includes API access.
  entries:
  - label: Monthly Subscription (billed annually)
    name: business_subscription
    type: flat
    metric: subscription
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: $269 / month
    userMultiplied: false
  - label: App Users
    name: app_users
    type: included
    metric: users
    limit: 500
    timeFrame: month
    geo: global
    unit: 1
    price: included
    userMultiplied: false
  elements:
  - name: API Access (Users Management and Database APIs)
  - name: Unlimited Published Apps
  - name: 1,000,000 Softr Database Records
  - name: 100 AI Credits / month
  - name: 25,000 Workflow Actions
  - name: Unlimited Custom User Groups
  - name: SSO Support
  - name: Audit Logging
- id: softr-enterprise
  name: Enterprise
  type: enterprise
  description: >-
    Custom limits, security, and support for organizations. Contact Softr sales.
  entries:
  - label: Enterprise Agreement
    name: enterprise
    type: flat
    metric: contract
    limit: -1
    timeFrame: year
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: false
  elements:
  - name: Custom App Users
  - name: Custom Database Records and AI Credits
  - name: Dedicated Success Manager
  - name: Priority Support
  - name: SOC2 Reporting
  - name: Advanced Security Options
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
